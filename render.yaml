services:
  - type: web
    name: vedikg-be
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_URL
        scope: run
      - key: GEMINI_API_KEY
        scope: run
      - key: PYTHON_VERSION
        value: "3.11"
